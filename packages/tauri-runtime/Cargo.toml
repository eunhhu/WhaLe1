[package]
name = "whale-tauri-runtime"
version = "0.1.0"
edition = "2021"

[dependencies]
tauri = { version = "2", features = ["tray-icon"] }
serde = { version = "1", features = ["derive"] }
serde_json = "1"
tokio = { version = "1", features = ["full"] }
rdev = "0.5"

[build-dependencies]
tauri-build = { version = "2", features = [] }
